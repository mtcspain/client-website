[build]
  publish = "."

# Redirect and header rules are managed in the _redirects and _headers files.
# Netlify Forms is enabled automatically via the data-netlify="true" attribute on the contact forms.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
