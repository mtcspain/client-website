<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deploy Test — MTC Spain</title>
  <style>
    :root {
      --cream: #f6f5f0;
      --green: #2e6e4e;
      --copper: #b4713f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--cream);
      color: #1c1c1c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e4e2da;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      max-width: 480px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: var(--green);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    h1 { font-size: 28px; color: var(--green); margin-bottom: 12px; }
    p { font-size: 16px; line-height: 1.6; color: #444; }
    .stamp {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #eceae2;
      font-size: 14px;
      color: var(--copper);
      font-weight: 600;
    }
    #time { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">DEPLOY TEST</span>
    <h1>It works.</h1>
    <p>If you can read this on the live Netlify URL, then GitHub is pushing to Netlify and the pipeline is set up correctly.</p>
    <div class="stamp">
      Version 1 &middot; Loaded at <span id="time">…</span>
    </div>
  </div>
  <script>
    document.getElementById('time').textContent = new Date().toLocaleString();
  </script>
</body>
</html>
